name: Build and release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Test and package
        run: mvn --batch-mode --no-transfer-progress clean verify

      # Record bare filenames, not build-time paths. Release assets download flat,
      # so a `target/`-prefixed entry makes `sha256sum --check` fail to find the file.
      - name: Create checksum
        run: cd target && find . -maxdepth 1 -name '*.jar' ! -name 'original-*' -printf '%f\0' | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-${{ github.sha }}
          path: |
            target/*.jar
            !target/original-*.jar
            target/SHA256SUMS.txt
          if-no-files-found: error

      - name: Upload tagged release assets
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 || gh release create "${{ github.ref_name }}" --generate-notes --title "${{ github.ref_name }}"
          find target -maxdepth 1 -name '*.jar' ! -name 'original-*' -print0 | xargs -0 gh release upload "${{ github.ref_name }}" --clobber
          gh release upload "${{ github.ref_name }}" target/SHA256SUMS.txt --clobber
